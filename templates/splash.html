
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  #splash-root {
    position: relative;
    width: 100%;
    min-height: 520px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    border-radius: 12px;
  }

  /* ── LIGHT theme ── */
  #splash-root.light {
    background: radial-gradient(ellipse at 50% 28%, #d4e6f4 0%, #c2d6e8 45%, #b4c9de 100%);
    color: #1a2e4a;
  }

  /* ── DARK theme ── */
  #splash-root.dark {
    background: radial-gradient(ellipse at 50% 28%, #0d1b2a 0%, #0f2236 45%, #122840 100%);
    color: #c8dff0;
  }

  /* ── Window-wipe overlay ── */
  #wipe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 0%;
    z-index: 30;
    pointer-events: none;
    transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #wipe.light-wipe { background: radial-gradient(ellipse at 50% 28%, #d4e6f4 0%, #c2d6e8 45%, #b4c9de 100%); }
  #wipe.dark-wipe  { background: radial-gradient(ellipse at 50% 28%, #0d1b2a 0%, #0f2236 45%, #122840 100%); }
  #wipe.wipe-down  { top: 0; bottom: auto; height: 100%; }
  #wipe.wipe-up    { top: auto; bottom: 0; height: 100%; }

  /* ── Rings ── */
  .ring {
    position: absolute;
    border-radius: 50%;
    left: 50%; top: 36%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .light .ring { border-color: rgba(96,144,184,.12); }
  .dark  .ring { border-color: rgba(96,170,255,.1); }
  @keyframes breathe {
    0%,100% { opacity:1; transform: translate(-50%,-50%) scale(1); }
    50%      { opacity:.45; transform: translate(-50%,-50%) scale(1.014); }
  }
  .ring { border: 1px solid; animation: breathe 8s ease-in-out infinite; }

  /* ── Nav ── */
  .sp-nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 56px;
    border-bottom: 1px solid rgba(255,255,255,.4);
    backdrop-filter: blur(18px);
  }
  .light .sp-nav { background: rgba(255,255,255,0.52); }
  .dark  .sp-nav { background: rgba(10,22,40,0.52); border-color: rgba(255,255,255,.08); }

  .brand { display:flex; align-items:center; gap:10px; }
  .brand-icon {
    width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .light .brand-icon { background:rgba(26,46,74,.1); border:1px solid rgba(26,46,74,.15); }
  .dark  .brand-icon { background:rgba(200,230,255,.1); border:1px solid rgba(200,230,255,.15); }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 600; letter-spacing: -.02em;
  }
  .light .brand-name { color: #1a2e4a; }
  .dark  .brand-name { color: #c8dff0; }
  .brand-sub {
    font-size:10px; font-weight:500; letter-spacing:.2em;
    text-transform:uppercase; margin-left:2px;
  }
  .light .brand-sub { color: rgba(74,111,154,.5); }
  .dark  .brand-sub { color: rgba(150,190,230,.35); }

  /* ── Dark mode toggle ── */
  .dm-toggle {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none; padding: 6px 12px;
    border-radius: 999px;
    font-size: 10px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase;
    border: none; background: transparent; font-family: 'DM Sans', sans-serif;
    transition: background .2s;
  }
  .light .dm-toggle { color: #1a2e4a; }
  .dark  .dm-toggle { color: #c8dff0; }
  .light .dm-toggle:hover { background: rgba(255,255,255,.5); }
  .dark  .dm-toggle:hover  { background: rgba(200,230,255,.08); }

  .toggle-track {
    width: 36px; height: 20px; border-radius: 999px;
    position: relative; transition: background .3s;
    flex-shrink: 0;
  }
  .light .toggle-track { background: rgba(26,46,74,.18); }
  .dark  .toggle-track  { background: rgba(96,170,255,.5); }
  .toggle-thumb {
    position: absolute; top: 3px; width: 14px; height: 14px;
    border-radius: 50%; transition: left .3s, background .3s;
  }
  .light .toggle-thumb { left: 3px; background: #4a6f9a; }
  .dark  .toggle-thumb  { left: 19px; background: #c8dff0; }

  /* ── Hero content ── */
  .sp-hero {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 52px 24px 48px;
    gap: 20px; text-align: center;
  }

  .sp-eyebrow {
    font-size: 9px; font-weight: 500; letter-spacing: .28em; text-transform: uppercase;
  }
  .light .sp-eyebrow { color: rgba(74,111,154,.55); }
  .dark  .sp-eyebrow { color: rgba(150,190,230,.45); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .sp-hero > * { animation: fadeUp .55s ease both; }
  .sp-hero > *:nth-child(1) { animation-delay: .05s; }
  .sp-hero > *:nth-child(2) { animation-delay: .15s; }
  .sp-hero > *:nth-child(3) { animation-delay: .25s; }
  .sp-hero > *:nth-child(4) { animation-delay: .35s; }
  .sp-hero > *:nth-child(5) { animation-delay: .45s; }

  .sp-headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 46px; font-weight: 400; line-height: 1.1; letter-spacing: -.02em;
  }
  .light .sp-headline { color: #1a2e4a; }
  .dark  .sp-headline { color: #daeeff; }
  .sp-headline em { font-style: italic; font-weight: 300; }

  .sp-sub {
    font-size: 14px; font-weight: 300; max-width: 360px; line-height: 1.7;
  }
  .light .sp-sub { color: rgba(26,46,74,.6); }
  .dark  .sp-sub { color: rgba(200,230,255,.5); }

  /* ── Face ring ── */
  .face-ring {
    width: 96px; height: 96px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .light .face-ring { background: rgba(255,255,255,.55); border: 1.5px solid rgba(255,255,255,.75); }
  .dark  .face-ring { background: rgba(20,50,80,.6); border: 1.5px solid rgba(96,170,255,.25); }
  .face-ring-pulse {
    position: absolute; inset: -10px; border-radius: 50%;
    border: 1px solid;
    animation: pulse 2.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:.5; transform:scale(1); }
    50%      { opacity:.1; transform:scale(1.06); }
  }
  .light .face-ring-pulse { border-color: rgba(96,144,184,.35); }
  .dark  .face-ring-pulse  { border-color: rgba(96,170,255,.3); }

  /* ── CTA buttons ── */
  .sp-ctas { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  .btn-primary {
    padding: .65rem 1.6rem; border-radius: 999px;
    font-size: 10px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase;
    cursor: pointer; border: none; font-family: 'DM Sans', sans-serif;
    transition: background .2s, transform .1s;
  }
  .light .btn-primary { background: #1a2e4a; color: #fff; }
  .dark  .btn-primary  { background: #4a89c4; color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); opacity: .9; }

  .btn-secondary {
    padding: .65rem 1.4rem; border-radius: 999px;
    font-size: 10px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: background .2s;
    background: transparent;
  }
  .light .btn-secondary { border: .5px solid rgba(26,46,74,.3); color: #1a2e4a; }
  .dark  .btn-secondary  { border: .5px solid rgba(200,230,255,.2); color: #c8dff0; }
  .light .btn-secondary:hover { background: rgba(255,255,255,.5); }
  .dark  .btn-secondary:hover  { background: rgba(255,255,255,.06); }

  /* ── Status pill ── */
  .sp-status {
    display: flex; align-items: center; gap: 8px;
    padding: .45rem 1.1rem; border-radius: 999px;
    backdrop-filter: blur(10px);
  }
  .light .sp-status { background: rgba(255,255,255,.38); border: 1px solid rgba(255,255,255,.55); }
  .dark  .sp-status  { background: rgba(20,50,80,.4); border: 1px solid rgba(96,170,255,.15); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
  .status-dot { width:7px; height:7px; border-radius:50%; animation: blink 1.8s ease-in-out infinite; }
  .light .status-dot { background: #a78bfa; }
  .dark  .status-dot  { background: #7dd3fc; }
  .status-txt {
    font-size: 10px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase;
  }
  .light .status-txt { color: #4a6f9a; }
  .dark  .status-txt  { color: rgba(150,200,240,.7); }
</style>

<div id="splash-root" class="light">

  <div id="wipe" class="light-wipe"></div>

  <div class="ring" style="width:260px;height:260px;animation-delay:0s"></div>
  <div class="ring" style="width:460px;height:460px;animation-delay:.9s"></div>
  <div class="ring" style="width:700px;height:700px;animation-delay:1.8s"></div>

  <nav class="sp-nav">
    <div class="brand">
      <div class="brand-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <span class="brand-name">KnownAgain</span>
      <span class="brand-sub">· Live</span>
    </div>

    <button class="dm-toggle" id="dmBtn" onclick="toggleDark()">
      <div class="toggle-track">
        <div class="toggle-thumb"></div>
      </div>
      <span id="dmLabel">Dark mode</span>
    </button>
  </nav>

  <div class="sp-hero">
    <div class="sp-eyebrow">Face Recognition Platform</div>

    <div class="face-ring">
      <div class="face-ring-pulse"></div>
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" opacity=".6">
        <path d="M9 3H5a2 2 0 0 0-2 2v4"/><path d="M15 3h4a2 2 0 0 1 2 2v4"/>
        <path d="M9 21H5a2 2 0 0 1-2-2v-4"/><path d="M15 21h4a2 2 0 0 0 2-2v-4"/>
        <circle cx="12" cy="10" r="3"/><path d="M7 21c0-2.8 2.2-5 5-5s5 2.2 5 5"/>
      </svg>
    </div>

    <h1 class="sp-headline">Remember <em>everyone</em><br>you've ever met.</h1>

    <p class="sp-sub">Real-time face recognition with intelligent memory. Every conversation, every visit — beautifully recalled.</p>

    <div class="sp-status">
      <div class="status-dot"></div>
      <span class="status-txt">System Ready</span>
    </div>

    <div class="sp-ctas">
  <button class="btn-primary" onclick="goToApp()">Get started ↗</button>
  <button class="btn-secondary" onclick="goToCalendar()">View calendar</button>
</div>
  </div>

</div>

<script>
  let isDark = false;

  function toggleDark() {
    const root = document.getElementById('splash-root');
    const wipe = document.getElementById('wipe');
    const label = document.getElementById('dmLabel');

    if (!isDark) {
      // going light → dark: wipe slides down from top
      wipe.className = 'dark-wipe wipe-down';
      wipe.style.height = '0%';
      wipe.style.top = '0';
      wipe.style.bottom = 'auto';

      requestAnimationFrame(() => {
        wipe.style.height = '100%';
      });

      setTimeout(() => {
        root.classList.remove('light');
        root.classList.add('dark');
        label.textContent = 'Light mode';
        wipe.style.height = '0%';
        wipe.style.transition = 'none';
        setTimeout(() => { wipe.style.transition = ''; }, 50);
      }, 600);

    } else {
      // going dark → light: wipe slides up from bottom
      wipe.className = 'light-wipe wipe-up';
      wipe.style.height = '0%';
      wipe.style.bottom = '0';
      wipe.style.top = 'auto';

      requestAnimationFrame(() => {
        wipe.style.height = '100%';
      });

      setTimeout(() => {
        root.classList.remove('dark');
        root.classList.add('light');
        label.textContent = 'Dark mode';
        wipe.style.height = '0%';
        wipe.style.transition = 'none';
        setTimeout(() => { wipe.style.transition = ''; }, 50);
      }, 600);
    }

    isDark = !isDark;
  }
  function goToApp() {
  document.getElementById("splash-root").style.opacity = "0";
  setTimeout(() => {
    window.location.href = "/home";
  }, 400);
}

function goToCalendar() {
  window.location.href = "/calendar";
}
</script>
