<!DOCTYPE html>
<html>
<head>
    <title>Conversation Calendar</title>
</head>
<body>

<h2>Conversation Calendar</h2>

<button onclick="window.location.href='/'"
        style="margin-bottom:15px;">
    ← Back to Live Demo
</button>

<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
    <button onclick="changeMonth(-1)">◀</button>
    <span id="calendarTitle"></span>
    <button onclick="changeMonth(1)">▶</button>
</div>

<div id="calendarGrid"
     style="display:grid;
            grid-template-columns: repeat(7, 1fr);
            gap:4px;">
</div>

<div id="calendarDetails"
     style="margin-top:20px;
            padding:12px;
            border:1px solid #ccc;
            display:none;">
</div>

<script>

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let calendarData = {};

function fetchCalendarData() {
    fetch('/calendar_data')
        .then(res => res.json())
        .then(data => {
            calendarData = data;
            renderCalendar();
        });
}

function renderCalendar() {

    const grid = document.getElementById("calendarGrid");
    const title = document.getElementById("calendarTitle");

    grid.innerHTML = "";

    const monthNames = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    title.innerText = monthNames[currentMonth] + " " + currentYear;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement("div"));
    }

    for (let day = 1; day <= daysInMonth; day++) {

        const dateString = currentYear + "-" +
            String(currentMonth + 1).padStart(2, "0") + "-" +
            String(day).padStart(2, "0");

        const cell = document.createElement("div");
        cell.innerText = day;
        cell.style.padding = "10px";
        cell.style.textAlign = "center";
        cell.style.cursor = "pointer";
        cell.style.border = "1px solid #ddd";

        if (calendarData[dateString]) {
            cell.style.background = "#b3e5fc";
        }

        cell.onclick = () => showDateDetails(dateString);

        grid.appendChild(cell);
    }
}

function changeMonth(offset) {

    currentMonth += offset;

    if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
    }

    if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
    }

    renderCalendar();
}

function showDateDetails(date) {

    const details = document.getElementById("calendarDetails");

    if (!calendarData[date]) {
        details.style.display = "none";
        return;
    }

    details.style.display = "block";
    details.innerHTML = "<strong>" + date + "</strong><br><br>";

    calendarData[date].forEach(entry => {

        details.innerHTML +=
            "<strong>" + entry.name + "</strong> (" + entry.relationship + ")<br>" +
            "<em>" + entry.summary + "</em><br><br>" +
            "<div style='background:#f3f3f3; padding:6px;'>" +
            entry.raw +
            "</div><br>" +
            "<div style='font-size:12px; color:#555;'>" +
            "Keywords: " + entry.keywords.join(", ") +
            "</div><br><hr>";
    });
}

fetchCalendarData();

</script>
</body>
</html>
