<!DOCTYPE html>
<html>
<head>
    <title>knownAgain Demo</title>
</head>
<body>

<h2>knownAgain Live Demo</h2>
<button onclick="window.location.href='/calendar'"
        style="margin-bottom:15px;">
    Open Conversation Calendar
</button>
<div style="position: relative; width: 400px;">
    <video id="video" width="400" autoplay playsinline></video>
    <canvas id="canvas" style="position:absolute; top:0; left:0;"></canvas>
</div>

<h3 id="status">Waiting...</h3>

<div id="info" style="white-space: pre-wrap; margin-top:10px;"></div>

<div id="subtitle"
     style="margin-top:15px;font-size:18px;min-height:40px;font-weight:500;white-space: pre-wrap;">
</div>

<!-- Timeline Panel -->
<div id="timelinePanel" style="margin-top:20px; display:none;">
    <h4>Recent Conversations</h4>
    <div id="timelineList"
         style="border:1px solid #ccc;
                padding:10px;
                max-height:200px;
                overflow-y:auto;
                font-size:14px;
                background:#f9f9f9;">
    </div>
</div>

<!-- Memory Intelligence Panel -->
<div id="memoryPanel" style="margin-top:15px; display:none;">
    <h4>Memory Insight</h4>
    <div id="memoryContent"
         style="border:1px solid #bbb;
                padding:10px;
                background:#f0f8ff;
                font-size:14px;">
    </div>
</div>

<!-- Registration Panel -->
<div id="registerPanel" style="display:none; margin-top:15px;">
    <h4>New Person Detected</h4>
    <input type="text" id="newName" placeholder="Enter Name">
    <input type="text" id="newRelation" placeholder="Enter Relationship">
    <button id="saveNew">Save Person</button>
</div>

<button id="recordBtn" style="margin-top:15px; display:none;">
    Record Conversation
</button>

<script>

/* ---------------- DOM ---------------- */

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const statusText = document.getElementById('status');
const infoBox = document.getElementById("info");
const subtitleBox = document.getElementById("subtitle");

const registerPanel = document.getElementById("registerPanel");
const saveNewBtn = document.getElementById("saveNew");
const recordBtn = document.getElementById("recordBtn");

const timelinePanel = document.getElementById("timelinePanel");
const timelineList = document.getElementById("timelineList");

const memoryPanel = document.getElementById("memoryPanel");
const memoryContent = document.getElementById("memoryContent");

let activeVisitor = null;
let activeUnknownId = null;
let lastDisplayedTranscript = null;
let isTyping = false;

/* ---------------- STABILITY BUFFER ---------------- */

let faceStability = {};
const REQUIRED_STABLE_FRAMES = 3;

/* ---------------- CAMERA ---------------- */

navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => video.srcObject = stream)
    .catch(err => console.error(err));

video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.style.width = video.clientWidth + "px";
    canvas.style.height = video.clientHeight + "px";
};

/* ---------------- SEND FRAME ---------------- */

function captureAndSend() {
    if (!video.videoWidth) return;

    const tempCanvas = document.createElement("canvas");
    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;

    const tempCtx = tempCanvas.getContext("2d");
    tempCtx.drawImage(video, 0, 0);

    tempCanvas.toBlob(blob => {
        const formData = new FormData();
        formData.append('image', blob, 'snapshot.jpg');

        fetch('/recognize', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => handleResponse(data));
    }, 'image/jpeg');
}

setInterval(captureAndSend, 400);

/* ---------------- TYPEWRITER ---------------- */

function typeWriter(text) {
    if (isTyping) return;
    isTyping = true;
    subtitleBox.innerText = "";
    let i = 0;

    function typing() {
        if (i < text.length) {
            subtitleBox.innerText += text[i];
            i++;
            setTimeout(typing, 25);
        } else {
            isTyping = false;
        }
    }
    typing();
}

/* ---------------- DRAW BOX ---------------- */

function drawCenteredBox(face, color, label) {

    const scaleX = canvas.width / video.videoWidth;
    const scaleY = canvas.height / video.videoHeight;

    const x = face.box.left * scaleX;
    const y = face.box.top * scaleY;
    const width = (face.box.right - face.box.left) * scaleX;
    const height = (face.box.bottom - face.box.top) * scaleY;

    const centerX = x + width / 2;
    const centerY = y + height / 2;
    const boxSize = Math.max(width, height) * 1.3;

    const newX = centerX - boxSize / 2;
    const newY = centerY - boxSize / 2;

    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    ctx.strokeRect(newX, newY, boxSize, boxSize);

    ctx.fillStyle = color;
    ctx.font = "16px Arial";
    ctx.fillText(label, newX, newY - 10);
}

/* ---------------- TIMELINE ---------------- */

function renderTimeline(history) {

    if (!history || history.length === 0) {
        timelinePanel.style.display = "none";
        return;
    }

    timelinePanel.style.display = "block";
    timelineList.innerHTML = "";

    history.slice().reverse().forEach((entry, index) => {

        const container = document.createElement("div");
        container.style.marginBottom = "10px";
        container.style.paddingBottom = "8px";
        container.style.borderBottom = "1px solid #ddd";

        // Unique ID for collapsible transcript
        const transcriptId = "transcript_" + index;

        container.innerHTML = `
            <strong>${entry.date}</strong><br>
            <em>${entry.summary}</em><br><br>

            <button onclick="toggleTranscript('${transcriptId}')"
                    style="font-size:12px; margin-bottom:5px;">
                Show Transcript
            </button>

            <div id="${transcriptId}"
                 style="display:none; font-size:13px; background:#f3f3f3; padding:6px; margin-top:5px;">
                ${entry.raw}
            </div>

            <div style="margin-top:5px; font-size:12px; color:#555;">
                <strong>Keywords:</strong> ${(entry.keywords || []).join(", ")}
            </div>
        `;

        timelineList.appendChild(container);
    });
}
function toggleTranscript(id) {

    const element = document.getElementById(id);

    if (element.style.display === "none") {
        element.style.display = "block";
    } else {
        element.style.display = "none";
    }
}
/* ---------------- MEMORY PANEL ---------------- */

function renderMemoryInsight(visitor) {

    if (!visitor.memory_insight &&
        (!visitor.top_keywords || visitor.top_keywords.length === 0)) {

        memoryPanel.style.display = "none";
        return;
    }

    memoryPanel.style.display = "block";

    let content = "";

    if (visitor.memory_insight) {
        content += "<strong>Pattern Insight:</strong><br>" +
                   visitor.memory_insight + "<br><br>";
    }

    if (visitor.memory_confidence !== undefined) {
        content += "<strong>Memory Confidence:</strong> " +
                   visitor.memory_confidence + "%<br><br>";
    }

    if (visitor.top_keywords && visitor.top_keywords.length > 0) {
        content += "<strong>Frequent Topics:</strong><br>" +
                   visitor.top_keywords.join(", ");
    }

    memoryContent.innerHTML = content;
}

/* ---------------- HANDLE RESPONSE ---------------- */

function handleResponse(data) {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (data.status !== "faces_detected") return;

    let currentFrameKeys = [];

    data.faces.forEach(face => {
        const key = face.name + "_" + (face.is_new_candidate ? "unknown" : "known");
        currentFrameKeys.push(key);

        if (!faceStability[key]) faceStability[key] = 0;
        faceStability[key]++;
    });

    Object.keys(faceStability).forEach(key => {
        if (!currentFrameKeys.includes(key)) {
            faceStability[key]--;
            if (faceStability[key] <= 0) delete faceStability[key];
        }
    });

    activeVisitor = null;
    activeUnknownId = null;

    data.faces.forEach(face => {

        const key = face.name + "_" + (face.is_new_candidate ? "unknown" : "known");
        if (faceStability[key] < REQUIRED_STABLE_FRAMES) return;

        if (face.is_patient) {
            drawCenteredBox(face, "blue", "Patient");
            return;
        }

        if (face.is_new_candidate) {
            drawCenteredBox(face, "orange", "Unknown");
            activeUnknownId = face.unknown_id;
            registerPanel.style.display = "block";
            return;
        }

        drawCenteredBox(face, "lime", face.name + " (" + face.confidence + "%)");
        activeVisitor = face;
    });

    if (!activeUnknownId) registerPanel.style.display = "none";

    if (activeVisitor) {

        statusText.innerText = "Visitor Recognized";

        infoBox.innerText =
            "Name: " + activeVisitor.name +
            "\nRelationship: " + activeVisitor.relationship +
            "\nLast seen: " + activeVisitor.last_seen +
            "\nTotal conversations: " + (activeVisitor.conversation_count || 0) +
            "\nLast conversation date: " + (activeVisitor.last_date || "None");

        recordBtn.style.display = "block";

        if (activeVisitor.last_topic &&
            activeVisitor.last_topic !== lastDisplayedTranscript) {

            typeWriter(
                activeVisitor.last_date
                    ? "On " + activeVisitor.last_date +
                      ", you talked about: " + activeVisitor.last_topic
                    : "No previous conversations recorded."
            );

            lastDisplayedTranscript = activeVisitor.last_topic;
        }

        renderTimeline(activeVisitor.recent_history);
        renderMemoryInsight(activeVisitor);

    } else {

        recordBtn.style.display = "none";
        infoBox.innerText = "";
        subtitleBox.innerText = "";
        timelinePanel.style.display = "none";
        timelineList.innerHTML = "";
        memoryPanel.style.display = "none";
        lastDisplayedTranscript = null;
        statusText.innerText = "Waiting...";
    }
}

/* ---------------- REGISTER ---------------- */

saveNewBtn.onclick = () => {

    const name = document.getElementById("newName").value;
    const relationship = document.getElementById("newRelation").value;

    if (!name || !relationship || !activeUnknownId) return;

    fetch('/register-new', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            unknown_id: activeUnknownId,
            name: name,
            relationship: relationship
        })
    }).then(() => {
        registerPanel.style.display = "none";
        document.getElementById("newName").value = "";
        document.getElementById("newRelation").value = "";
    });
};

/* ---------------- SMART AUTO STOP RECORDING ---------------- */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {

    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = "en-US";

    let isRecording = false;
    let finalTranscript = "";
    let lastSpeechTime = null;
    let silenceTimer = null;

    const SILENCE_LIMIT = 3000; // 3 seconds = real pause

    recordBtn.onclick = () => {

        if (!activeVisitor) return;

        if (!isRecording) {
            finalTranscript = "";
            recognition.start();
            isRecording = true;
            recordBtn.innerText = "Listening...";
            lastSpeechTime = Date.now();

            silenceTimer = setInterval(checkSilence, 1000);
        }
    };

    recognition.onresult = function(event) {

        lastSpeechTime = Date.now();

        for (let i = event.resultIndex; i < event.results.length; i++) {

            if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript + " ";
            }
        }

        subtitleBox.innerText = finalTranscript;
    };

    function checkSilence() {

        if (!isRecording) return;

        const now = Date.now();
        const silenceDuration = now - lastSpeechTime;

        if (silenceDuration > SILENCE_LIMIT) {

            stopRecording();
        }
    }

    function stopRecording() {

        recognition.stop();
        clearInterval(silenceTimer);
        isRecording = false;
        recordBtn.innerText = "Record Conversation";

        if (finalTranscript.trim().length > 0) {
            fetch('/add-note', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: activeVisitor.name,
                    note: finalTranscript.trim()
                })
            });
        }
    }

    recognition.onerror = function(event) {
        console.log("Speech error:", event.error);
        stopRecording();
    };

    recognition.onend = function() {
        if (isRecording) {
            recognition.start(); // prevent auto-end on small pause
        }
    };
}
</script>
</body>
</html>
